<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lexicon — Diccionario latino-español de Raimundo de Miguel</title>
<meta name="description" content="Edición digital, en curso, del Nuevo diccionario latino-español etimológico de Raimundo de Miguel y el Marqués de Morante (1878). Consulta por lema.">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <p class="masthead__kicker">Nuevo diccionario latino-español etimológico</p>
    <h1 class="masthead__title">Lexicon</h1>
    <p class="masthead__sub">Raimundo de Miguel <span class="amp">&amp;</span> el Marqués de Morante · 1878 — edición digital en curso</p>
    <nav class="masthead__nav" aria-label="Secciones">
      <a href="index.html" aria-current="page">Consultar</a><span>·</span><a href="editor.html">Añadir entradas</a>
    </nav>
  </header>

  <main>
    <div class="search">
      <label class="search__label" for="q">Buscar un lema latino</label>
      <input id="q" class="search__field" type="search" inputmode="search"
             autocomplete="off" autocapitalize="off" spellcheck="false"
             placeholder="Buscar un lema… (p. ej. adæque, adaequo)">
      <svg class="search__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.6"/>
        <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    <p class="search__count" id="count" aria-live="polite"></p>

    <div id="view"></div>
  </main>

</div>

<script src="lexicon.js"></script>
<script>
(function(){
  const q = document.getElementById('q');
  const view = document.getElementById('view');
  const count = document.getElementById('count');
  let entries = [];

  // Collator para ordenar respetando el alfabeto latino normalizado.
  const collator = new Intl.Collator('es', { sensitivity: 'base' });
  const byLemma = (a, b) => collator.compare(normalize(a.lemma), normalize(b.lemma));

  fetch('entries.json')
    .then(r => { if (!r.ok) throw new Error('http'); return r.json(); })
    .then(data => {
      entries = data.slice().sort(byLemma);
      count.textContent = entries.length + ' entradas';
      render('');
    })
    .catch(() => {
      view.innerHTML = `<div class="notice">
        <strong>No se pudo cargar <code>entries.json</code>.</strong>
        Si abres este archivo directamente desde el disco, el navegador bloquea la lectura del JSON.
        Publícalo en GitHub Pages, o sírvelo en local con <code>python3 -m http.server</code> y abre
        <code>http://localhost:8000</code>.
      </div>`;
    });

  function matches(query){
    const nq = normalize(query);
    if (!nq) return [];
    const starts = [], contains = [];
    for (const e of entries){
      const key = searchKey(e);
      if (key.split(' ').some(k => k.startsWith(nq))) starts.push(e);
      else if (key.includes(nq)) contains.push(e);
    }
    return starts.concat(contains);
  }

  function render(query){
    if (!query.trim()){
      // Estado inicial: índice alfabético navegable.
      const items = entries.map(e =>
        `<li><button type="button" data-id="${e.id}">${esc(e.lemma)}</button></li>`
      ).join('');
      view.innerHTML = `<nav aria-label="Índice de lemas">
        <p class="browse__head">Índice — toca un lema</p>
        <ul class="browse__list">${items}</ul>
      </nav>`;
      view.querySelectorAll('button[data-id]').forEach(b => {
        b.addEventListener('click', () => { q.value = ''; showOne(b.dataset.id); });
      });
      count.textContent = entries.length + ' entradas';
      return;
    }

    const found = matches(query);
    count.textContent = found.length
      ? found.length + (found.length === 1 ? ' resultado' : ' resultados')
      : 'Sin resultados';

    if (!found.length){
      view.innerHTML = `<div class="notice">
        No hay ningún lema que empiece o contenga <strong>“${esc(query)}”</strong>.
        Prueba sin cantidades ni ligaduras: <code>adaeque</code> encuentra <em>adæque</em>.
      </div>`;
      return;
    }
    view.innerHTML = `<section class="results">
      <p class="results__hint">${found.length === 1 ? 'Entrada' : 'Entradas'}</p>
      ${found.map(renderEntry).join('')}
    </section>`;
  }

  function showOne(id){
    const e = entries.find(x => x.id === id);
    if (!e) { render(''); return; }
    count.textContent = '1 entrada';
    view.innerHTML = `<section class="results">
      <p class="results__hint">Entrada</p>${renderEntry(e)}
    </section>`;
    window.scrollTo({ top: 0, behavior: 'auto' });
  }

  let t;
  q.addEventListener('input', () => {
    clearTimeout(t);
    t = setTimeout(() => render(q.value), 90);
  });
  q.focus();
})();
</script>
</body>
</html>
